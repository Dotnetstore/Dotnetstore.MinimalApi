name: Commit Message

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: commit-message-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate commit messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Conventional Commit messages
        shell: bash
        run: |
          set -euo pipefail
          regex='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([[:alnum:]_.\/-]+\))?(!)?: .+$'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.ref }}"
            git fetch origin "$base_ref" --depth=1
            messages=$(git log --format=%s "origin/$base_ref..HEAD")
          else
            before_sha="${{ github.event.before }}"
            zero_sha='0000000000000000000000000000000000000000'

            if [[ "$before_sha" == "$zero_sha" ]]; then
              messages=$(git log --format=%s --reverse "${{ github.sha }}")
            else
              messages=$(git log --format=%s "$before_sha..${{ github.sha }}")
            fi
          fi

          if [[ -z "$messages" ]]; then
            echo "No commit messages found to validate."
            exit 0
          fi

          invalid=0
          while IFS= read -r message; do
            [[ -z "$message" ]] && continue

            if [[ "$message" == Merge* ]]; then
              echo "Skipping merge commit message: $message"
              continue
            fi

            if [[ ! "$message" =~ $regex ]]; then
              echo "::error::Invalid commit message: '$message'"
              invalid=1
            fi
          done <<< "$messages"

          if [[ $invalid -ne 0 ]]; then
            echo "Commit messages must follow Conventional Commits. Example: feat(api): add health endpoint"
            exit 1
          fi

